# Cấu hình Nginx cho Hanet WebAPI - Option 3: Share port 80
# Thêm block location này vào file nginx config của API đang chạy trên port 80
# File config thường ở: /etc/nginx/sites-available/default hoặc tên API của bạn

# Upstream định nghĩa cho .NET app
# Thêm upstream này vào đầu file nginx config của bạn (ngoài server block)
upstream hanet_api {
    server localhost:5000;
    keepalive 32;
}

